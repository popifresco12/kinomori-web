<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta data-i18n-title="meta.home_title">
  <title>Kinomori — Asian Kitchen & Surf Life | Tamraght, Morocco</title>
  <meta name="description" content="Kinomori: Asian cuisine & lifestyle in Tamraght, Morocco. Fresh flavors, surf vibes, and mindful living.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== LANDING: Hero + Footer only, no intermediate scroll ===== */
    html, body {
      height: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Hero fills available space, centered */
    .hero {
      flex: 1 0 auto;
      min-height: unset;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 6rem 5% 2rem; /* top padding accounts for fixed navbar */
      position: relative;
    }
    .hero .scroll-indicator {
      display: none;
    }
    .hero-content {
      text-align: center;
      max-width: 700px;
    }
    .hero-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--sand);
      opacity: 0.85;
      margin-bottom: 0.3rem;
    }
    .hero-content h1 {
      font-size: clamp(3.5rem, 12vw, 8rem);
      line-height: 1.05;
      margin-bottom: 0.5rem;
    }
    .hero-location {
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      max-width: 90%;
      margin: 0 auto 1.5rem;
      line-height: 1.4;
      opacity: 0.85;
    }
    .hero-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hero-buttons .btn {
      padding: 0.7rem 1.8rem;
      font-size: 0.85rem;
    }

    /* Footer: compact, auto height, never scrolls away */
    footer.contact {
      flex: 0 0 auto;
      padding: 1.8rem 5%;
    }
    footer.contact .footer-grid {
      gap: 1.5rem;
      align-items: start;
    }
    footer.contact .footer-brand h3 {
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
    }
    footer.contact .footer-brand p {
      font-size: 0.8rem;
    }
    footer.contact h4 {
      font-size: 0.65rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.12em;
    }
    footer.contact p,
    footer.contact a {
      font-size: 0.8rem;
      line-height: 1.5;
    }
    footer.contact .footer-bottom {
      padding-top: 1rem;
      margin-top: 1rem;
      font-size: 0.7rem;
    }
    .instagram-icon {
      width: 28px;
      height: 28px;
    }

    /* ===== MOBILE COMPACT MODE ===== */
    @media (max-width: 600px) {
      .hero {
        padding: 5.5rem 5% 1.2rem;
      }
      .hero-content h1 {
        font-size: clamp(3rem, 14vw, 5rem);
        margin-bottom: 0.3rem;
      }
      .hero-subtitle {
        font-size: 0.95rem;
        margin-bottom: 0.2rem;
      }
      .hero-location {
        font-size: 0.8rem;
        margin-bottom: 1rem;
      }
      .hero-buttons .btn {
        padding: 0.6rem 1.4rem;
        font-size: 0.8rem;
      }
      footer.contact {
        padding: 1.4rem 5%;
      }
      footer.contact .footer-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      footer.contact .footer-brand {
        grid-column: 1 / -1;
        text-align: center;
        margin-bottom: 0.3rem;
      }
    }

    /* ===== VERY SMALL SCREENS (landscape phones) ===== */
    @media (max-height: 600px) {
      .hero {
        padding-top: 4.5rem;
        justify-content: flex-start;
        padding-bottom: 0.5rem;
      }
      .hero-content h1 {
        font-size: clamp(2.5rem, 10vh, 4rem);
      }
      footer.contact {
        padding: 1rem 5%;
      }
      footer.contact .footer-grid {
        gap: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar injected by components.js -->
  <nav class="navbar" id="navbar"></nav>

  <!-- ==================== HERO ==================== -->
  <section class="hero" id="home">
    <div class="hero-content">
      <p class="hero-subtitle" data-i18n="hero.subtitle">Nourishment & Waves</p>
      <h1 data-i18n="hero.title">KINOMORI</h1>
      <p class="hero-location" data-i18n="hero.location">Asian Kitchen & Surf Life — Tamraght, Morocco</p>
      <div class="hero-buttons">
        <a href="shop.html" class="btn btn-primary" data-i18n="hero.btn_shop">Explore Shop</a>
        <a href="story.html" class="btn btn-outline" data-i18n="hero.btn_story">Our Story</a>
      </div>
    </div>
  </section>

  <!-- Footer injected by components.js -->
  <footer class="contact" id="footer"></footer>

  <script src="js/i18n.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
