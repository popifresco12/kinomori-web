<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta data-i18n-title="meta.home_title">
  <title>Kinomori — Asian Kitchen & Surf Life | Tamraght, Morocco</title>
  <meta name="description" content="Kinomori: Asian cuisine & lifestyle in Tamraght, Morocco. Fresh flavors, surf vibes, and mindful living.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== LANDING: Fullscreen hero, scroll to footer ===== */
    .hero {
      height: 100dvh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 5rem 5% 2rem;
      position: relative;
    }
    .hero .scroll-indicator {
      display: none;
    }
    .hero-content {
      text-align: center;
      max-width: 700px;
      width: 100%;
    }
    .hero-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 3vw, 1.5rem);
      color: var(--sand);
      opacity: 0.85;
      margin-bottom: 0.2rem;
    }
    .hero-content h1 {
      font-size: clamp(3.5rem, 12vw, 8rem);
      line-height: 1.05;
      margin-bottom: 0.4rem;
    }
    .hero-location {
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      max-width: 90%;
      margin: 0 auto 1.5rem;
      line-height: 1.4;
      opacity: 0.85;
    }
    .hero-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hero-buttons .btn {
      padding: 0.7rem 1.8rem;
      font-size: 0.85rem;
    }

    /* Footer: normal flow below hero */
    footer.contact {
      padding: 4rem 5%;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      .hero {
        padding: 4.5rem 5% 1.5rem;
      }
      .hero-content h1 {
        font-size: clamp(3rem, 14vw, 5.5rem);
      }
      .hero-subtitle {
        font-size: 0.95rem;
      }
      .hero-location {
        font-size: 0.82rem;
        margin-bottom: 1.2rem;
      }
      .hero-buttons .btn {
        padding: 0.6rem 1.5rem;
        font-size: 0.82rem;
      }
      footer.contact {
        padding: 2.5rem 5%;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar injected by components.js -->
  <nav class="navbar" id="navbar"></nav>

  <!-- ==================== HERO (fullscreen) ==================== -->
  <section class="hero" id="home">
    <div class="hero-content">
      <p class="hero-subtitle" data-i18n="hero.subtitle">Nourishment & Waves</p>
      <h1 data-i18n="hero.title">KINOMORI</h1>
      <p class="hero-location" data-i18n="hero.location">Asian Kitchen & Surf Life — Tamraght, Morocco</p>
      <div class="hero-buttons">
        <a href="shop.html" class="btn btn-primary" data-i18n="hero.btn_shop">Explore Shop</a>
        <a href="story.html" class="btn btn-outline" data-i18n="hero.btn_story">Our Story</a>
      </div>
    </div>
  </section>

  <!-- ==================== FOOTER (scroll down to see) ==================== -->
  <footer class="contact" id="footer"></footer>

  <script src="js/i18n.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
