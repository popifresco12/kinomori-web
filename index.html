<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta data-i18n-title="meta.home_title">
  <title>Kinomori — Asian Kitchen & Surf Life | Tamraght, Morocco</title>
  <meta name="description" content="Kinomori: Asian cuisine & lifestyle in Tamraght, Morocco. Fresh flavors, surf vibes, and mindful living.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Landing page: no-scroll layout */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1 1 auto;
      min-height: unset;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-bottom: 4rem;
    }
    .hero .scroll-indicator {
      display: none;
    }
    footer.contact {
      flex: 0 0 auto;
      padding: 2.5rem 5%;
    }
    footer.contact .footer-grid {
      gap: 2rem;
    }
    footer.contact .footer-brand h3 {
      font-size: 1.3rem;
    }
    footer.contact h4 {
      font-size: 0.7rem;
      margin-bottom: 0.6rem;
    }
    footer.contact p,
    footer.contact a {
      font-size: 0.8rem;
    }
    footer.contact .footer-bottom {
      padding-top: 1.2rem;
      margin-top: 1.2rem;
    }
  </style>
</head>
<body>

  <!-- Navbar injected by components.js -->
  <nav class="navbar" id="navbar"></nav>

  <!-- ==================== HERO ==================== -->
  <section class="hero" id="home">
    <div class="hero-content">
      <p class="hero-subtitle" data-i18n="hero.subtitle">Nourishment & Waves</p>
      <h1 data-i18n="hero.title">KINOMORI</h1>
      <p class="hero-location" data-i18n="hero.location">Asian Kitchen & Surf Life — Tamraght, Morocco</p>
      <div class="hero-buttons">
        <a href="shop.html" class="btn btn-primary" data-i18n="hero.btn_shop">Explore Shop</a>
        <a href="story.html" class="btn btn-outline" data-i18n="hero.btn_story">Our Story</a>
      </div>
    </div>
  </section>

  <!-- Footer injected by components.js -->
  <footer class="contact" id="footer"></footer>

  <script src="js/i18n.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
